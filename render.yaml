# Render Blueprint — описывает инфраструктуру проекта.
# При деплое через "Blueprint" Render сам поднимет веб-сервис + базу
# и свяжет их (подставит DATABASE_URL автоматически).
services:
  - type: web
    name: barbershop-tseh
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render сгенерирует случайный ключ сам
      - key: FLASK_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false                   # это значение вы введёте вручную в дашборде
      - key: DATABASE_URL
        fromDatabase:
          name: barbershop-db
          property: connectionString  # ссылка на базу подставится автоматически

databases:
  - name: barbershop-db
    plan: free
